<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMRA TRAVEL | Премиальные паломнические туры</title>
    
    <meta name="description" content="Организация премиальных паломнических туров в Мекку и Медину. Комфорт, сопровождение и забота о каждом этапе вашего духовного путешествия.">
    <meta property="og:title" content="UMRA TRAVEL | Премиальные паломнические туры">
    <meta property="og:description" content="Ваше духовное путешествие с максимальным комфортом.">
    <meta property="og:type" content="website">
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063198.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #c5a059;
            --dark: #0a0a0a;
            --light: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--light); line-height: 1.6; }

        /* Helpers */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
        section { padding: clamp(60px, 10vw, 120px) 0; }

        /* Navigation */
        .navbar { position: fixed; top: 0; width: 100%; padding: 20px 0; z-index: 1000; transition: var(--transition); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; }
        .navbar.scrolled { background: rgba(0,0,0,0.8); padding: 15px 0; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .nav-links a { color: white; text-decoration: none; margin-left: 30px; font-weight: 500; transition: var(--transition); display: inline-block; }
        .nav-links a:hover { transform: scale(1.1); color: var(--primary); }

        /* Hero */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1591604466107-ec97de573aff?q=80&w=2071') center/cover; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        
        .btn { padding: 15px 40px; background: var(--primary); color: white; border: none; cursor: pointer; text-transform: uppercase; font-weight: 600; transition: var(--transition); border-radius: 50px; display: inline-block; text-decoration: none; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3); }
        .btn:disabled { background: #555; cursor: not-allowed; }

        /* Features Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { padding: 40px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: var(--transition); text-align: center; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card i { font-size: 2rem; color: var(--primary); margin-bottom: 20px; }

        /* Form */
        form { display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; gap: 20px; }
        input, textarea { padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 10px; width: 100%; }

        /* Animations */
        .fade-in { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
        .fade-in.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="#" class="logo">UMRA TRAVEL</a>
            <div class="nav-links">
                <a href="#features" aria-label="Преимущества">Преимущества</a>
                <a href="#contact" aria-label="Контакты">Контакты</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container fade-in">
            <h1>Духовное путешествие</h1>
            <p>Премиальные паломнические туры в святые земли</p>
            <br>
            <a href="#contact" class="btn">Забронировать тур</a>
        </div>
    </header>

    <section id="features">
        <div class="container">
            <h2 style="font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); text-align: center; margin-bottom: 60px;">Почему мы</h2>
            <div class="grid">
                <div class="card fade-in"><i class="fa-solid fa-kaaba"></i><h3>Полная организация</h3></div>
                <div class="card fade-in"><i class="fa-solid fa-hotel"></i><h3>Отели 5*</h3></div>
                <div class="card fade-in"><i class="fa-solid fa-user-tie"></i><h3>Русские гиды</h3></div>
                <div class="card fade-in"><i class="fa-solid fa-plane"></i><h3>Прямые рейсы</h3></div>
                <div class="card fade-in"><i class="fa-solid fa-shield"></i><h3>Виза включена</h3></div>
                <div class="card fade-in"><i class="fa-solid fa-hands-praying"></i><h3>Обучение</h3></div>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="container">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 3rem; text-align: center; margin-bottom: 50px;">Свяжитесь с нами</h2>
            <form id="leadForm">
                <label for="name" class="visually-hidden">Ваше имя</label>
                <input type="text" id="name" placeholder="Ваше имя" required>
                
                <label for="phone" class="visually-hidden">Телефон</label>
                <input type="tel" id="phone" placeholder="Ваш телефон" required>
                
                <label for="message" class="visually-hidden">Ваш вопрос</label>
                <textarea id="message" rows="5" placeholder="Ваши вопросы"></textarea>
                
                <button type="submit" id="submitBtn" class="btn">Отправить заявку</button>
            </form>
        </div>
    </section>

    <script>
        // Scroll Effect
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });

        // Animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // Form Submission
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Отправка...';
            
            setTimeout(() => {
                alert('Спасибо! Мы скоро свяжемся с вами.');
                btn.disabled = false;
                btn.textContent = 'Отправить заявку';
                this.reset();
            }, 1500);
        });
    </script>
</body>
</html>
